name: Deploy Pages Preview

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-preview-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Deploy preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_BRANCH: ${{ github.event.pull_request.head.ref }}
          PAGES_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          npx --yes wrangler@4.84.1 pages deploy dist \
            --project-name codex-monitor-web \
            --branch "$PAGES_BRANCH" \
            --commit-hash "$PAGES_COMMIT_SHA" \
            --commit-dirty=true
